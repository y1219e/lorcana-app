* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e; --border: #2a2a4a;

  --ruby: #e74c3c; --sapphire: #2980b9; --steel: #95a5a6;

body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
#nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--surface); border-top: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 10px 4px 14px; background: none; border: none; color: var(--text2); font-size: 0.65rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav-btn .icon { font-size: 1.3rem; }
.nav-btn.active { color: var(--accent); }
.page { display: none; padding-bottom: 70px; }
.page.active { display: block; }
.page-header { background: var(--surface); padding: 12px 16px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.page-header h1 { font-size: 1rem; flex: 1; }
.badge { background: var(--accent); color: #fff; font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; }
.filter-bar { padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-bar::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 0.72rem; cursor: pointer; white-space: nowrap; }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip.amber { border-color: var(--amber); } .chip.amber.active { background: var(--amber); border-color: var(--amber); color: #000; }
.chip.amethyst { border-color: var(--amethyst); } .chip.amethyst.active { background: var(--amethyst); border-color: var(--amethyst); }
.chip.emerald { border-color: var(--emerald); } .chip.emerald.active { background: var(--emerald); border-color: var(--emerald); }
.chip.ruby { border-color: var(--ruby); } .chip.ruby.active { background: var(--ruby); border-color: var(--ruby); }
.chip.sapphire { border-color: var(--sapphire); } .chip.sapphire.active { background: var(--sapphire); border-color: var(--sapphire); }
.chip.steel { border-color: var(--steel); } .chip.steel.active { background: var(--steel); border-color: var(--steel); }

.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }

.card-item.owned { border-color: var(--accent); }
.card-item img { width: 100%; aspect-ratio: 429/600; object-fit: cover; display: block; background: var(--surface2); }

// ═══════════════════════════════════════════
// Service Worker をBlobで登録（画像キャッシュ）
// ═══════════════════════════════════════════
const SW_CODE = `
const CACHE_NAME = 'lorcana-img-v1';
const IMG_ORIGIN = 'https://disneylorcana.jp';

self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  const url = e.request.url;
  if (!url.startsWith(IMG_ORIGIN) || !url.endsWith('.webp')) return;
  e.respondWith(
    caches.open(CACHE_NAME).then(cache =>
      cache.match(e.request).then(cached => {
        if (cached) return cached;
        return fetch(e.request).then(res => {
          if (res.ok) cache.put(e.request, res.clone());
          return res;
        }).catch(() => cached);
      })
    )
  );
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(e => {
    // Blob URLのscopeエラーは無視（機能自体は動く）
    console.info('SW scope limited:', e.message);
  });
}

function makeInkDot(ink) {
  const span = document.createElement('span');
  span.className = 'ink-dot';
  const src = INK_IMG[ink] ?? '';
  if(src) {
    const img = document.createElement('img');
    img.src = src;
    img.alt = ink ?? '';
    span.appendChild(img);
  }
  return span;
}

function makeRarityIcon(rarity) {
  const span = document.createElement('span');
  span.className = 'rarity-icon';
  const src = RARITY_IMG[rarity] ?? '';
  if(src) {
    const img = document.createElement('img');
    img.src = src;
    img.alt = rarity ?? '';
    span.appendChild(img);
  }
  return span;
}

// カードデータキャッシュ（IndexedDB, 2ヶ月TTL）
// ═══════════════════════════════════════════
const CARD_CACHE_TTL = 60 * 24 * 60 * 60 * 1000; // 2ヶ月 (ms)
const CARD_CACHE_KEY = 'card_cache_v1';

async function loadCardCache() {
  return new Promise(r => {
    const tx = db.transaction('meta', 'readonly');
    tx.objectStore('meta').get(CARD_CACHE_KEY).onsuccess = e => r(e.target.result ?? null);
  });
}
async function saveCardCache(sets, cards) {
  return new Promise(r => {
    const tx = db.transaction('meta', 'readwrite');
    tx.objectStore('meta').put({ id: CARD_CACHE_KEY, sets, cards, savedAt: Date.now() });
    tx.oncomplete = () => r();
  });
}

// ═══════════════════════════════════════════
// 画像URL生成ユーティリティ
// ═══════════════════════════════════════════
function slug(str){ return (str??'').replace(/[^a-zA-Z0-9]/g,''); }
function padNum(n){ return String(n).replace(/^(\d+)/, m => m.padStart(3,'0')); }
function getInkCode(card, info) {
  const inks = card.inks ?? (card.ink ? [card.ink] : []);
  const codes = inks.map(i => INK_CODE[i] ?? '').join('');
  if(info.suffixX) return codes + 'X';
  if(info.dualInk) return inks.length > 1 ? codes : codes + 'X';
  return codes;
}

function buildImageUrls(card){
  const setCode = card.set?.code ?? '1';
  const info = SET_INFO[setCode];
  if(!info) return [''];

  const num = padNum(card.collector_number);
  const base = IMG_HOST + info.month + '/';

  // 例外マップ（month2フォールバックあり）
  const exKey = `${setCode}_${card.collector_number}`;
  if(EXCEPTION_IMG[exKey]) {
    const base2 = info.month2 ? IMG_HOST + info.month2 + '/' : null;
    const urls = [base + EXCEPTION_IMG[exKey]];
    if(base2) urls.push(base2 + EXCEPTION_IMG[exKey]);
    return urls;
  }

  if(info.newPattern){
    return [`${base}${info.slug}_ja_${num}.webp`];
  }

  const rarity  = RARITY_CODE[card.rarity] ?? 'C';
  const inkC    = getInkCode(card, info);
  const typeC   = TYPE_CODE[card.type?.[0]] ?? 'C';
  const prefix  = (info.dualInk || info.suffixX)
    ? `${num}_${info.code}_${rarity}${typeC}${inkC}`
    : `${num}_${info.code}_${rarity}${inkC}${typeC}`;
  const nameS   = slug(card.name);
  const verS    = slug(card.version);

  if(info.size) {
    if(card.type?.includes('Character') && verS){
      return [
        `${base}${prefix}_${nameS}_${verS}_JA-${info.size}.webp`,
        `${base}${prefix}_${nameS}_${verS}_JA.webp`,
      ];
    } else {
      return [
        `${base}${prefix}_${nameS}_JA.webp`,
        `${base}${prefix}_${nameS}_JA-${info.size}.webp`,
      ];
    }
  }

  const urls = [];
  if(card.type?.includes('Character') && verS){
    urls.push(`${base}${prefix}_${nameS}_${verS}_JA.webp`);
    if(info.month2) urls.push(`${IMG_HOST}${info.month2}/${prefix}_${nameS}_${verS}_JA.webp`);
  } else {
    urls.push(`${base}${prefix}_${nameS}_JA.webp`);
    if(info.month2) urls.push(`${IMG_HOST}${info.month2}/${prefix}_${nameS}_JA.webp`);
  }
  return urls;
}

function makeImg(card){
  const urls = buildImageUrls(card);
  const img  = document.createElement('img');
  img.src = urls[0]; img.alt = card.name; img.loading = 'lazy';
  let i = 0;
  img.onerror = () => {
    i++;
    if(i < urls.length) img.src = urls[i];
    else { const ph=document.createElement('div'); ph.className='img-placeholder'; ph.textContent=card.name; img.replaceWith(ph); }
  };
  return img;
}

// ═══════════════════════════════════════════
// IndexedDB（collection / decks / meta）
// ═══════════════════════════════════════════
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open('lorcana', 3);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('collection')) d.createObjectStore('collection',{keyPath:'id'});
      if(!d.objectStoreNames.contains('decks'))      d.createObjectStore('decks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta'))       d.createObjectStore('meta',{keyPath:'id'});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = () => rej(req.error);
  });
}
function dbPut(store,val){ return new Promise(r=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(val).onsuccess=()=>r(); }); }
function dbDelete(store,key){ return new Promise(r=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(key).onsuccess=()=>r(); }); }
function dbGetAll(store){ return new Promise(r=>{ const tx=db.transaction(store,'readonly'); tx.objectStore(store).getAll().onsuccess=e=>r(e.target.result); }); }

// ═══════════════════════════════════════════
// アプリ状態
// ═══════════════════════════════════════════
let allCards=[],sets=[],collection={},decks=[],filterSet='',filterInk='',searchQ='',currentCard=null,currentDeck=null;

function filteredCards(){
  return allCards.filter(c=>{
    if(filterSet && c.set?.code!==filterSet) return false;
    if(filterInk && c.ink!==filterInk) return false;
    if(searchQ){ const q=searchQ.toLowerCase(); if(!(c.name?.toLowerCase().includes(q)||c.version?.toLowerCase().includes(q))) return false; }
    return true;
  });
}

// collection[id] は {normal, foil} 形式。旧形式(数値)はnormalとして扱う
function getOwned(id){ const c=collection[id]; if(!c) return {normal:0,foil:0}; if(typeof c==='number') return {normal:c,foil:0}; return {normal:c.normal??0,foil:c.foil??0}; }
function ownedTotal(id){ const o=getOwned(id); return o.normal+o.foil; }

function renderCardGrid(){
  const grid=document.getElementById('cardGrid');
  const badge=document.getElementById('cardCountBadge');
  const cards=filteredCards();
  badge.textContent=cards.length;
  grid.innerHTML='';
  cards.forEach(card=>{
    const total=ownedTotal(card.id);
    const item=document.createElement('div');
    item.className='card-item'+(total>0?' owned':'');
    item.appendChild(makeImg(card));
    const info=document.createElement('div'); info.className='card-info';
    const nameDiv=document.createElement('div'); nameDiv.className='card-name';
    nameDiv.appendChild(makeInkDot(card.ink)); nameDiv.appendChild(document.createTextNode(card.name));
    const subDiv=document.createElement('div'); subDiv.className='card-sub';
    subDiv.appendChild(document.createTextNode(`#${card.collector_number} `));
    subDiv.appendChild(makeRarityIcon(card.rarity));
    subDiv.appendChild(document.createTextNode(card.rarity));
    info.appendChild(nameDiv); info.appendChild(subDiv);
    item.appendChild(info);
    if(total>0){ const o=getOwned(card.id); const b=document.createElement('div'); b.className='own-badge'; b.textContent=o.foil>0?`${o.normal}+${o.foil}✨`:o.normal; item.appendChild(b); }
    item.addEventListener('click',()=>openCardModal(card));
    grid.appendChild(item);
  });
}

function renderSetFilter(){
  const bar=document.getElementById('setFilter');
  bar.innerHTML='<button class="chip active" data-set="">全て</button>';
  sets.forEach(s=>{ const btn=document.createElement('button'); btn.className='chip'; btn.dataset.set=s.code; btn.textContent=`第${s.code}弾`; bar.appendChild(btn); });
  bar.querySelectorAll('.chip').forEach(btn=>{ btn.addEventListener('click',()=>{ bar.querySelectorAll('.chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); filterSet=btn.dataset.set; renderCardGrid(); }); });
}

function openCardModal(card){
  currentCard=card;
  const o=getOwned(card.id);
  const urls=buildImageUrls(card);
  const mi=document.getElementById('modalImg'); mi.src=urls[0]; let i=0; mi.onerror=()=>{ i++; if(i<urls.length) mi.src=urls[i]; };
  document.getElementById('modalName').textContent=card.name;
  document.getElementById('modalSub').textContent=card.version??'';
  const inks = card.inks ?? (card.ink ? [card.ink] : []);
  document.getElementById('modalMeta').textContent=`${inks.join('/')} · ${card.type?.join(', ')??''} · ${card.rarity} · #${card.collector_number} · 第${card.set?.code}弾`;
  document.getElementById('countValN').textContent=o.normal;
  document.getElementById('countValF').textContent=o.foil;
  document.getElementById('countDecN').disabled=o.normal<=0;
  document.getElementById('countDecF').disabled=o.foil<=0;
  document.getElementById('cardModal').classList.add('open');
}
function closeCardModal(){ document.getElementById('cardModal').classList.remove('open'); currentCard=null; }
document.getElementById('modalClose').addEventListener('click',closeCardModal);
document.getElementById('cardModal').addEventListener('click',e=>{ if(e.target===document.getElementById('cardModal')) closeCardModal(); });

async function setOwned(cardId, normal, foil){
  if(normal<=0 && foil<=0){ await dbDelete('collection',cardId); delete collection[cardId]; }
  else { const val={id:cardId,normal,foil}; await dbPut('collection',val); collection[cardId]=val; }
}

async function updateCount(type, delta){
  if(!currentCard) return;
  const o=getOwned(currentCard.id);
  const normal = type==='normal' ? Math.max(0, o.normal+delta) : o.normal;
  const foil   = type==='foil'   ? Math.max(0, o.foil+delta)   : o.foil;
  await setOwned(currentCard.id, normal, foil);
  document.getElementById('countValN').textContent=normal;
  document.getElementById('countValF').textContent=foil;
  document.getElementById('countDecN').disabled=normal<=0;
  document.getElementById('countDecF').disabled=foil<=0;
  renderCardGrid(); renderProgress();
}
document.getElementById('countDecN').addEventListener('click',()=>updateCount('normal',-1));
document.getElementById('countIncN').addEventListener('click',()=>updateCount('normal',+1));
document.getElementById('countDecF').addEventListener('click',()=>updateCount('foil',-1));
document.getElementById('countIncF').addEventListener('click',()=>updateCount('foil',+1));

function renderProgress(){
  const section=document.getElementById('progressSection'); section.innerHTML='';
  const total=allCards.length; const owned=allCards.filter(c=>ownedTotal(c.id)>0).length;
  addProg(section,'全セット合計',owned,total);
  sets.forEach(s=>{ const sc=allCards.filter(c=>c.set?.code===s.code); const so=sc.filter(c=>ownedTotal(c.id)>0).length; addProg(section,`第${s.code}弾 ${SET_NAMES_JA[s.code]??s.name}`,so,sc.length); });
}
function addProg(parent,label,owned,total){
  const pct=total>0?Math.round(owned/total*100):0;
  const div=document.createElement('div'); div.className='progress-card';
  div.innerHTML=`<h3>${label}</h3><div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div><div class="progress-nums">${owned} / ${total} (${pct}%)</div>`;
  parent.appendChild(div);
}

function renderDeckList(){
  const list=document.getElementById('deckList'); list.innerHTML='';
  decks.forEach(deck=>{
    const total=Object.values(deck.cards??{}).reduce((a,b)=>a+b,0);
    const inks=[...new Set(Object.keys(deck.cards??{}).filter(id=>(deck.cards[id]??0)>0).flatMap(id=>{ const c=allCards.find(x=>x.id===id); return c?.inks ?? (c?.ink?[c.ink]:[]); }).filter(Boolean))];
    const div=document.createElement('div'); div.className='deck-card';
    const left=document.createElement('div');
    const h3=document.createElement('h3'); h3.textContent=deck.name||'名称未設定';
    const meta=document.createElement('div'); meta.className='deck-meta';
    inks.forEach(i=>meta.appendChild(makeInkDot(i)));
    meta.appendChild(document.createTextNode(` ${inks.length}色`));
    left.appendChild(h3); left.appendChild(meta);
    const cnt=document.createElement('div'); cnt.className='deck-count'; cnt.textContent=`${total}/60`;
    div.appendChild(left); div.appendChild(cnt);
    div.addEventListener('click',()=>openDeckEditor(deck));
    list.appendChild(div);
  });
}

function deckTotal(){ return Object.values(currentDeck.cards??{}).reduce((a,b)=>a+b,0); }
function deckInks(){
  return [...new Set(Object.keys(currentDeck.cards??{}).filter(id=>(currentDeck.cards[id]??0)>0).flatMap(id=>{ const c=allCards.find(x=>x.id===id); return c?.inks ?? (c?.ink?[c.ink]:[]); }).filter(Boolean))];
}

function openDeckEditor(deck){
  currentDeck=deck?{...deck,cards:{...(deck.cards??{})}}:{id:Date.now().toString(),name:'',cards:{}};
  document.getElementById('deckNameInput').value=currentDeck.name??'';
  document.getElementById('editorDel').style.display=deck?'':'none';
  document.getElementById('deckEditor').classList.add('open');
  document.getElementById('editorSearch').value='';
  renderDeckEditor();
}
function closeDeckEditor(){ document.getElementById('deckEditor').classList.remove('open'); currentDeck=null; }

function renderDeckEditor(){
  const total=deckTotal(); const inks=deckInks();
  document.getElementById('deckTotal').innerHTML=`<span>${total}</span> / 60枚`;
  document.getElementById('inkWarning').style.display=inks.length>2?'':'none';
  const dl=document.getElementById('deckCardList'); dl.innerHTML='';
  const entries=Object.entries(currentDeck.cards??{}).filter(([,v])=>v>0);
  if(!entries.length){ dl.innerHTML='<div style="padding:12px;font-size:0.75rem;color:var(--text2);">右から追加してください</div>'; }
  entries.forEach(([cardId,count])=>{
    const card=allCards.find(c=>c.id===cardId); if(!card) return;
    const row=document.createElement('div'); row.className='deck-card-row';
    row.appendChild(makeImg(card));
    const di=document.createElement('div'); di.className='dc-info';
    di.innerHTML=`<div class="dc-name">${card.name}</div><div class="dc-sub">${card.version??''} · ${(card.inks??[card.ink]).join('/')}</div>`;
    row.appendChild(di);
    const db2=document.createElement('div'); db2.className='dc-btns';
    db2.innerHTML=`<button class="dc-btn rem">－</button><span class="dc-count">${count}</span><button class="dc-btn add">＋</button>`;
    db2.querySelector('.rem').addEventListener('click',()=>{ currentDeck.cards[cardId]=Math.max(0,count-1); renderDeckEditor(); });
    db2.querySelector('.add').addEventListener('click',()=>{
      if(total>=60||count>=4) return;
      const cardInks=card.inks??(card.ink?[card.ink]:[]);
      const curInks=deckInks();
      const newInks=[...new Set([...curInks,...cardInks])];
      if(newInks.length>2) return;
      currentDeck.cards[cardId]=count+1; renderDeckEditor();
    });
    row.appendChild(db2);
    dl.appendChild(row);
  });
  renderEditorCardList();
}

function renderEditorCardList(){
  const q=document.getElementById('editorSearch').value.toLowerCase();
  const list=document.getElementById('editorCardList'); list.innerHTML='';
  const total=deckTotal(); const inks=deckInks();
  allCards.filter(c=>!q||(c.name?.toLowerCase().includes(q)||c.version?.toLowerCase().includes(q))).slice(0,60).forEach(card=>{
    const count=currentDeck.cards[card.id]??0;
    const cardInks=card.inks??(card.ink?[card.ink]:[]);
    const newInks=[...new Set([...inks,...cardInks])];
    const canAdd=total<60&&count<4&&newInks.length<=2;
    const row=document.createElement('div'); row.className='deck-card-row';
    row.appendChild(makeImg(card));
    const di=document.createElement('div'); di.className='dc-info';
    const dn=document.createElement('div'); dn.className='dc-name';
    dn.appendChild(makeInkDot(card.ink)); dn.appendChild(document.createTextNode(card.name));
    const ds=document.createElement('div'); ds.className='dc-sub'; ds.textContent=`${card.version??''} · #${card.collector_number}`;
    di.appendChild(dn); di.appendChild(ds);
    row.appendChild(di);
    const db2=document.createElement('div'); db2.className='dc-btns';
    const ab=document.createElement('button'); ab.className='dc-btn add'; ab.textContent='＋'; ab.disabled=!canAdd; ab.style.opacity=canAdd?'1':'0.3';
    ab.addEventListener('click',()=>{ if(!canAdd) return; currentDeck.cards[card.id]=(currentDeck.cards[card.id]??0)+1; renderDeckEditor(); });
    const cs=document.createElement('span'); cs.className='dc-count'; cs.textContent=count||'';
    db2.appendChild(ab); db2.appendChild(cs); row.appendChild(db2);
    list.appendChild(row);
  });
}

document.getElementById('editorSearch').addEventListener('input',renderEditorCardList);
document.getElementById('editorBack').addEventListener('click',closeDeckEditor);
document.getElementById('editorSave').addEventListener('click',async()=>{
  currentDeck.name=document.getElementById('deckNameInput').value||'名称未設定';
  await dbPut('decks',currentDeck);
  const idx=decks.findIndex(d=>d.id===currentDeck.id); if(idx>=0) decks[idx]=currentDeck; else decks.push(currentDeck);
  renderDeckList(); closeDeckEditor();
});
document.getElementById('editorDel').addEventListener('click',async()=>{
  if(!confirm(`「${currentDeck.name}」を削除しますか？`)) return;
  await dbDelete('decks',currentDeck.id); decks=decks.filter(d=>d.id!==currentDeck.id);
  renderDeckList(); closeDeckEditor();
});
document.getElementById('addDeckBtn').addEventListener('click',()=>openDeckEditor(null));

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.page).classList.add('active');
    if(btn.dataset.page==='pageCollection') renderProgress();
    if(btn.dataset.page==='pageDecks') renderDeckList();
  });
});
document.getElementById('cardSearch').addEventListener('input',e=>{ searchQ=e.target.value; renderCardGrid(); });

// インクフィルターチップにSVGアイコン＋名前を挿入
const INK_NAMES_JA = { Amber:'アンバー', Amethyst:'アメジスト', Emerald:'エメラルド', Ruby:'ルビー', Sapphire:'サファイア', Steel:'スティール' };
document.getElementById('inkFilter').querySelectorAll('.chip[data-ink]').forEach(btn=>{
  const ink = btn.dataset.ink;
  if(ink) {
    btn.appendChild(makeInkDot(ink));
    btn.appendChild(document.createTextNode(INK_NAMES_JA[ink]??ink));
  }
  btn.addEventListener('click',()=>{ document.getElementById('inkFilter').querySelectorAll('.chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); filterInk=ink; renderCardGrid(); });
});

// ═══════════════════════════════════════════
// データ取得（並列fetch + IndexedDBキャッシュ）
// ═══════════════════════════════════════════
async function loadData(){
  const overlay = document.getElementById('loadingOverlay');
  const prog    = document.getElementById('loadProgress');
  const cInfo   = document.getElementById('cacheInfo');
  overlay.classList.add('show');

  // キャッシュチェック
  const cached = await loadCardCache();
  const now = Date.now();
  if(cached && (now - cached.savedAt) < CARD_CACHE_TTL) {
    const age = Math.floor((now - cached.savedAt) / (24*60*60*1000));
    prog.textContent = 'キャッシュから読み込み中…';
    cInfo.textContent = `最終更新: ${age}日前`;
    sets    = cached.sets;
    allCards = cached.cards;
    overlay.classList.remove('show');
    return;
  }

  // キャッシュなし or 期限切れ → API取得
  cInfo.textContent = cached ? '2ヶ月経過のため再取得中…' : '';
  try {
    prog.textContent = 'セット情報を取得中…';
    const sRes  = await fetch('https://api.lorcast.com/v0/sets');
    const sData = await sRes.json();
    sets = (sData.results ?? []).filter(s => SET_INFO[s.code]);

    prog.textContent = `全${sets.length}弾を並列取得中…`;

    // ★ 並列fetch（80msウェイトなし）
    const results = await Promise.allSettled(
      sets.map(s => fetch(`https://api.lorcast.com/v0/sets/${s.code}/cards`).then(r => r.json()))
    );

    allCards = [];
    results.forEach((result, i) => {
      if(result.status !== 'fulfilled') { console.warn(`Set ${sets[i].code} fetch failed`); return; }
      const s = sets[i];
      const cards = Array.isArray(result.value) ? result.value : [];
      const filtered = cards.filter(c => {
        const key = `${s.code}_${c.collector_number}`;
        if(SKIP_CARDS.has(key)) return false;
        if(s.code === '9' && !SET9_JA.has(c.collector_number)) return false;
        return true;
      });
      allCards.push(...filtered);
    });

    allCards.sort((a,b)=>{
      const sc = (a.set?.code??'').localeCompare(b.set?.code??'',undefined,{numeric:true});
      return sc!==0 ? sc : String(a.collector_number).localeCompare(String(b.collector_number),undefined,{numeric:true});
    });

    // キャッシュ保存
    await saveCardCache(sets, allCards);

  } catch(e) {
    prog.textContent = 'エラー: ' + e.message;
    // キャッシュが古くても使う
    if(cached) { sets = cached.sets; allCards = cached.cards; }
    else { overlay.classList.remove('show'); return; }
  }

  overlay.classList.remove('show');
}

// ═══════════════════════════════════════════
// 起動
// ═══════════════════════════════════════════
(async()=>{
  await openDB();
  const rows = await dbGetAll('collection');
  collection = {}; rows.forEach(r => { collection[r.id] = r.count; });
  decks = await dbGetAll('decks');
  await loadData();
  renderSetFilter();
  renderCardGrid();
})();
