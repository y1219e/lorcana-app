<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロルカナ コレクション</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f1a;color:#e8e8f0;font-family:-apple-system,sans-serif;min-height:100vh}
header{background:#1a1a2e;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;border-bottom:1px solid #2a2a4a}
header h1{font-size:1.1rem;font-weight:700;color:#c8a8ff}
nav{display:flex;gap:4px;margin-left:auto}
nav button{background:none;border:1px solid #3a3a5a;color:#aaa;padding:6px 12px;border-radius:6px;font-size:0.8rem;cursor:pointer;transition:all .2s}
nav button.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
#loading{display:flex;align-items:center;justify-content:center;height:200px;color:#aaa;font-size:0.9rem;gap:8px}
.spinner{width:20px;height:20px;border:2px solid #3a3a5a;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* フィルター */
#filters{padding:12px 16px;background:#14142a;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid #2a2a4a}
#filters select,#filters input{background:#1e1e3a;border:1px solid #3a3a5a;color:#e8e8f0;padding:6px 10px;border-radius:6px;font-size:0.82rem;outline:none}
#filters input{flex:1;min-width:140px}
#filters select{cursor:pointer}

/* カードグリッド */
#card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:12px 16px}
.card-item{background:#1a1a2e;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;position:relative}
.card-item:active{transform:scale(0.97)}
.card-item.owned{border-color:#7c3aed}
.card-item img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#0f0f2a}
.card-item .card-footer{padding:4px 6px;font-size:0.68rem;color:#aaa;display:flex;justify-content:space-between;align-items:center}
.card-item .qty-badge{background:#7c3aed;color:#fff;border-radius:10px;padding:1px 6px;font-size:0.7rem;font-weight:700}
.card-item .no-img{display:flex;align-items:center;justify-content:center;aspect-ratio:3/4;background:#1e1e3a;font-size:0.65rem;color:#666;text-align:center;padding:4px}

/* モーダル */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px}
#modal-overlay.open{display:flex}
#modal{background:#1a1a2e;border-radius:12px;max-width:400px;width:100%;padding:20px;border:1px solid #3a3a5a}
#modal h2{font-size:1rem;margin-bottom:4px;color:#c8a8ff}
#modal .sub{font-size:0.8rem;color:#888;margin-bottom:16px}
#modal img{width:100%;border-radius:8px;margin-bottom:16px;max-height:300px;object-fit:contain;background:#0f0f2a}
.qty-control{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:16px}
.qty-control button{background:#2a2a4a;border:none;color:#fff;width:36px;height:36px;border-radius:8px;font-size:1.2rem;cursor:pointer}
.qty-control button:active{background:#7c3aed}
.qty-control span{font-size:1.4rem;font-weight:700;min-width:24px;text-align:center}
#modal-close{width:100%;background:#2a2a4a;border:none;color:#e8e8f0;padding:10px;border-radius:8px;cursor:pointer;font-size:0.9rem}

/* コレクション進捗 */
#collection-view{padding:16px}
.set-progress{background:#1a1a2e;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #2a2a4a}
.set-progress h3{font-size:0.9rem;color:#c8a8ff;margin-bottom:8px}
.progress-bar{background:#0f0f2a;border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px}
.progress-fill{background:linear-gradient(90deg,#7c3aed,#a855f7);height:100%;border-radius:4px;transition:width .4s}
.progress-text{font-size:0.75rem;color:#888;display:flex;justify-content:space-between}

/* デッキビルダー */
#deck-view{padding:16px}
.deck-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.deck-list-header h2{font-size:1rem;color:#c8a8ff}
#new-deck-btn{background:#7c3aed;border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:0.82rem;cursor:pointer}
.deck-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:14px;margin-bottom:10px}
.deck-card h3{font-size:0.9rem;color:#e8e8f0;margin-bottom:4px}
.deck-card .deck-meta{font-size:0.75rem;color:#888;margin-bottom:10px}
.deck-actions{display:flex;gap:8px}
.deck-actions button{flex:1;padding:7px;border-radius:6px;border:none;cursor:pointer;font-size:0.78rem}
.btn-edit{background:#2a2a4a;color:#e8e8f0}
.btn-delete{background:#3a1a1a;color:#ff7070}

/* デッキエディタ */
#deck-editor{padding:16px;display:none}
#deck-editor.open{display:block}
#deck-editor h2{font-size:1rem;color:#c8a8ff;margin-bottom:12px}
.editor-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:480px){.editor-split{grid-template-columns:1fr}}
.editor-panel{background:#1a1a2e;border-radius:8px;padding:12px;border:1px solid #2a2a4a}
.editor-panel h3{font-size:0.82rem;color:#aaa;margin-bottom:8px}
.editor-search{width:100%;background:#0f0f2a;border:1px solid #3a3a5a;color:#e8e8f0;padding:7px 10px;border-radius:6px;font-size:0.82rem;margin-bottom:8px;outline:none}
.search-results{max-height:220px;overflow-y:auto}
.search-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e1e3a;cursor:pointer}
.search-item:active{background:#1e1e3a}
.search-item img{width:32px;height:44px;object-fit:cover;border-radius:4px;background:#0f0f2a}
.search-item .info{flex:1;min-width:0}
.search-item .info .name{font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item .info .sub{font-size:0.65rem;color:#888}
.search-item .add-btn{background:#7c3aed;border:none;color:#fff;width:26px;height:26px;border-radius:6px;font-size:1rem;cursor:pointer;flex-shrink:0}
.deck-slot{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1e1e3a}
.deck-slot .info{flex:1;min-width:0;font-size:0.75rem}
.deck-slot .info .sub{font-size:0.65rem;color:#888}
.deck-slot .qty{font-size:0.75rem;color:#a855f7;font-weight:700;min-width:20px;text-align:center}
.deck-slot .remove{background:none;border:none;color:#ff7070;cursor:pointer;font-size:1rem;padding:0 4px}
.deck-count{font-size:0.78rem;color:#888;margin-bottom:8px}
.deck-count span{color:#a855f7;font-weight:700}
#deck-editor .actions{display:flex;gap:8px;margin-top:12px}
#deck-editor .actions button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem}
.btn-save{background:#7c3aed;color:#fff}
.btn-cancel{background:#2a2a4a;color:#e8e8f0}
#deck-name-input{width:100%;background:#0f0f2a;border:1px solid #3a3a5a;color:#e8e8f0;padding:8px 10px;border-radius:6px;font-size:0.9rem;margin-bottom:12px;outline:none}
</style>
</head>

<header>
  <h1>🌟 ロルカナ</h1>
  <nav>
    <button class="active" onclick="showTab('cards')">カード</button>
    <button onclick="showTab('collection')">コレクション</button>
    <button onclick="showTab('decks')">デッキ</button>
  </nav>
</header>

<!-- カードタブ -->
<div id="tab-cards">
  <div id="filters">
    <select id="set-filter" onchange="applyFilters()">
      <option value="">全セット</option>
      <option value="1">第1弾</option>
      <option value="2">第2弾</option>
      <option value="3">第3弾</option>
      <option value="4">第4弾</option>
      <option value="5">第5弾</option>
      <option value="6">第6弾</option>
      <option value="7">第7弾</option>
      <option value="8">第8弾</option>
      <option value="9">第9弾</option>
    </select>
    <select id="ink-filter" onchange="applyFilters()">
      <option value="">全インク</option>
      <option value="Amber">アンバー</option>
      <option value="Amethyst">アメジスト</option>
      <option value="Emerald">エメラルド</option>
      <option value="Ruby">ルビー</option>
      <option value="Sapphire">サファイア</option>
      <option value="Steel">スティール</option>
    </select>
    <input id="name-filter" placeholder="カード名検索..." oninput="applyFilters()">
  </div>
  <div id="loading"><div class="spinner"></div>データ読込中...</div>
  <div id="card-grid" style="display:none"></div>
</div>

<!-- コレクションタブ -->
<div id="tab-collection" style="display:none">
  <div id="collection-view"></div>
</div>

<!-- デッキタブ -->
<div id="tab-decks" style="display:none">
  <div id="deck-view">
    <div class="deck-list-header">
      <h2>デッキ一覧</h2>
      <button id="new-deck-btn" onclick="openEditor(null)">＋ 新規作成</button>
    </div>
    <div id="deck-list"></div>
  </div>
  <div id="deck-editor">
    <h2 id="editor-title">デッキ作成</h2>
    <input id="deck-name-input" placeholder="デッキ名を入力..." maxlength="40">
    <div class="editor-split">
      <div class="editor-panel">
        <h3>カード検索</h3>
        <input class="editor-search" id="editor-search" placeholder="カード名..." oninput="searchCards()">
        <div class="search-results" id="search-results"></div>
      </div>
      <div class="editor-panel">
        <h3>デッキ内容</h3>
        <div class="deck-count">合計: <span id="deck-total">0</span>/60</div>
        <div id="deck-slots"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-save" onclick="saveDeck()">保存</button>
      <button class="btn-cancel" onclick="closeEditor()">キャンセル</button>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h2 id="modal-name"></h2>
    <div class="sub" id="modal-sub"></div>
    <img id="modal-img" src="" alt="">
    <div class="qty-control">
      <button onclick="changeQty(-1)">－</button>
      <span id="modal-qty">0</span>
      <button onclick="changeQty(1)">＋</button>
    </div>
    <button id="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

// ========== 画像URL生成 ==========
function sanitizeName(s) {
  return (s||'').replace(/[^a-zA-Z0-9]/g,'');
}

function buildImageUrls(card, setCode) {
  const info = SET_INFO[setCode];
  if (!info) return [];
  const base = `${IMG_HOST}${info.month}/`;
  const num = String(card.collector_number).padStart(3,'0');
  const key = `${setCode}_${card.collector_number}`;

  // 例外マップ優先
  if (EXCEPTION_IMG[key]) {
    const fname = EXCEPTION_IMG[key];
    const urls = [`${base}${fname}`];
    if (info.month2) urls.push(`${IMG_HOST}${info.month2}/${fname}`);
    return urls;
  }

  // 新パターン（第3〜6弾）
  if (info.newPattern) {
    return [`${base}${info.slug}_ja_${num}.webp`];
  }

  // 旧パターン
  const inks = card.inks || (card.ink ? [card.ink] : []);
  const rarity = card.rarity || '';
  const type0 = (card.type || [])[0] || 'Character';
  const typeCode = TYPE_CODE[type0] || 'C';

  // レアリティコード
  let rarCode = RARITY_CODE[rarity] || 'C';
  // 第9弾アイコニックはQコード
  if (setCode === '9' && SET9_ICONIC_Q.has(card.collector_number)) rarCode = 'Q';

  // インクコード
  let inkStr = '';
  if (info.dualInk) {
    // 第7弾: デュアルインクのみX付き、シングルはそのまま
    if (inks.length >= 2) {
      inkStr = (INK_CODE[inks[0]]||'') + (INK_CODE[inks[1]]||'') + 'X';
    } else {
      inkStr = INK_CODE[inks[0]] || '';
    }
  } else if (info.suffixX) {
    // 第8・9弾: シングルもX付き
    if (inks.length >= 2) {
      inkStr = (INK_CODE[inks[0]]||'') + (INK_CODE[inks[1]]||'');
    } else {
      inkStr = INK_CODE[inks[0]] || '';
    }
    inkStr += 'X';
  } else {
    // 第1・2弾
    inkStr = inks.map(i => INK_CODE[i]||'').join('');
  }

  const prefix = `${num}_${info.code}_${rarCode}${typeCode}${inkStr}`;
  const nameS = sanitizeName(card.name);
  const verS = sanitizeName(card.version);
  const sizeSuffix = info.size ? `_JA-${info.size}.webp` : '_JA.webp';

  const urls = [];
  if (card.type?.includes('Character') && verS) {
    urls.push(`${base}${prefix}_${nameS}_${verS}${sizeSuffix}`);
    if (info.month2) urls.push(`${IMG_HOST}${info.month2}/${prefix}_${nameS}_${verS}${sizeSuffix}`);
  } else {
    urls.push(`${base}${prefix}_${nameS}${sizeSuffix}`);
    if (info.month2) urls.push(`${IMG_HOST}${info.month2}/${prefix}_${nameS}${sizeSuffix}`);
  }
  return urls;
}

// ========== IndexedDB ==========
let db;
async function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('LorcanaDB', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('collection')) d.createObjectStore('collection');
      if (!d.objectStoreNames.contains('decks')) d.createObjectStore('decks', {keyPath:'id'});
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}
async function dbGet(store, key) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => res(null);
  });
}
async function dbPut(store, key, value) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readwrite');
    const req = tx.objectStore(store).put(value, key);
    req.onsuccess = () => res();
    req.onerror = () => res();
  });
}
async function dbGetAll(store) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => res([]);
  });
}
async function dbDelete(store, key) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => res();
  });
}

// ========== データ読込 ==========
let allCards = [];
let filteredCards = [];
let collection = {}; // key: "setCode_num" => qty

async function loadData() {
  db = await openDB();

  // コレクション読込
  const coll = await dbGet('collection', 'data');
  collection = coll || {};

  // Lorcast API から全セット取得
  const promises = SETS.map(s => loadSet(s.code));
  const results = await Promise.all(promises);
  results.forEach(cards => allCards.push(...cards));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('card-grid').style.display = 'grid';
  applyFilters();
  renderCollection();
}

async function loadSet(setCode) {
  try {
    const res = await fetch(`https://api.lorcast.com/v0/sets/${setCode}/cards?limit=300`);
    const data = await res.json();
    const cards = data.results || data || [];
    const s = SETS.find(x => x.code === setCode);
    const filtered = cards.filter(c => {
      const key = `${setCode}_${c.collector_number}`;
      if (SKIP_CARDS.has(key)) return false;
      if (setCode === '9' && !SET9_JA.has(c.collector_number)) return false;
      return true;
    });
    return filtered.map(c => ({ ...c, _setCode: setCode, _setName: s?.name || '' }));
  } catch (e) {
    console.error('loadSet error', setCode, e);
    return [];
  }
}

// ========== フィルター ==========
function applyFilters() {
  const setF = document.getElementById('set-filter').value;
  const inkF = document.getElementById('ink-filter').value;
  const nameF = document.getElementById('name-filter').value.toLowerCase().trim();

  filteredCards = allCards.filter(c => {
    if (setF && c._setCode !== setF) return false;
    if (inkF && !(c.inks||[c.ink]).includes(inkF)) return false;
    if (nameF && !(c.name||'').toLowerCase().includes(nameF)) return false;
    return true;
  });
  renderGrid();
}

// ========== グリッド描画 ==========
function renderGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  filteredCards.forEach(card => {
    const key = `${card._setCode}_${card.collector_number}`;
    const qty = collection[key] || 0;
    const urls = buildImageUrls(card, card._setCode);
    const item = document.createElement('div');
    item.className = 'card-item' + (qty > 0 ? ' owned' : '');
    item.onclick = () => openModal(card);

    let imgHtml = '';
    if (urls.length > 0) {
      imgHtml = `<img src="${urls[0]}" alt="${card.name}" loading="lazy" onerror="tryNextUrl(this,${JSON.stringify(urls)},1)">`;
    } else {
      imgHtml = `<div class="no-img">${card.name}</div>`;
    }

    item.innerHTML = `
      ${imgHtml}
      <div class="card-footer">
        <span>${card.collector_number}</span>
        ${qty > 0 ? `<span class="qty-badge">${qty}</span>` : ''}
      </div>`;
    grid.appendChild(item);
  });
}

function tryNextUrl(img, urls, idx) {
  if (idx < urls.length) {
    img.src = urls[idx];
    img.onerror = () => tryNextUrl(img, urls, idx + 1);
  } else {
    img.onerror = null;
    img.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'no-img';
    div.textContent = img.alt;
    img.parentNode.insertBefore(div, img);
  }
}

// ========== モーダル ==========
let modalCard = null;

function openModal(card) {
  modalCard = card;
  const key = `${card._setCode}_${card.collector_number}`;
  const qty = collection[key] || 0;
  document.getElementById('modal-name').textContent = card.name || '';
  document.getElementById('modal-sub').textContent =
    `${card.version ? card.version + ' / ' : ''}${card._setName} #${card.collector_number}`;
  document.getElementById('modal-qty').textContent = qty;

  const urls = buildImageUrls(card, card._setCode);
  const img = document.getElementById('modal-img');
  if (urls.length > 0) {
    img.src = urls[0];
    img.onerror = () => tryNextUrl(img, urls, 1);
    img.style.display = '';
  } else {
    img.style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

async function changeQty(delta) {
  if (!modalCard) return;
  const key = `${modalCard._setCode}_${modalCard.collector_number}`;
  let qty = (collection[key] || 0) + delta;
  qty = Math.max(0, Math.min(4, qty));
  collection[key] = qty;
  document.getElementById('modal-qty').textContent = qty;
  await dbPut('collection', 'data', collection);
  // グリッド更新
  renderGrid();
  renderCollection();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCard = null;
}

// ========== コレクション ==========
function renderCollection() {
  const view = document.getElementById('collection-view');
  let html = '';
  SETS.forEach(s => {
    const setCards = allCards.filter(c => c._setCode === s.code);
    const total = setCards.length;
    const owned = setCards.filter(c => (collection[`${s.code}_${c.collector_number}`]||0) > 0).length;
    const pct = total > 0 ? Math.round(owned/total*100) : 0;
    html += `
      <div class="set-progress">
        <h3>${s.name}</h3>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text"><span>${owned}/${total} 枚</span><span>${pct}%</span></div>
      </div>`;
  });
  view.innerHTML = html || '<div style="padding:20px;color:#888">データ読込中...</div>';
}

// ========== デッキ ==========
let decks = [];
let editingDeck = null; // {id, name, cards: [{cardKey, qty}]}
let tempDeckCards = {}; // cardKey => {card, qty}

async function loadDecks() {
  decks = await dbGetAll('decks');
  renderDeckList();
}

function renderDeckList() {
  const list = document.getElementById('deck-list');
  if (decks.length === 0) {
    list.innerHTML = '<div style="color:#888;font-size:0.85rem;padding:10px 0">デッキがありません</div>';
    return;
  }
  list.innerHTML = decks.map(d => {
    const total = d.cards.reduce((s,c) => s+c.qty, 0);
    return `
      <div class="deck-card">
        <h3>${d.name}</h3>
        <div class="deck-meta">${total}/60枚</div>
        <div class="deck-actions">
          <button class="btn-edit" onclick="openEditor('${d.id}')">編集</button>
          <button class="btn-delete" onclick="deleteDeck('${d.id}')">削除</button>
        </div>
      </div>`;
  }).join('');
}

function openEditor(deckId) {
  document.getElementById('deck-view').style.display = 'none';
  const editor = document.getElementById('deck-editor');
  editor.classList.add('open');

  if (deckId === null) {
    editingDeck = { id: 'deck_' + Date.now(), name: '', cards: [] };
    document.getElementById('editor-title').textContent = 'デッキ作成';
    document.getElementById('deck-name-input').value = '';
    tempDeckCards = {};
  } else {
    editingDeck = JSON.parse(JSON.stringify(decks.find(d => d.id === deckId)));
    document.getElementById('editor-title').textContent = 'デッキ編集';
    document.getElementById('deck-name-input').value = editingDeck.name;
    tempDeckCards = {};
    editingDeck.cards.forEach(item => {
      const card = allCards.find(c => `${c._setCode}_${c.collector_number}` === item.cardKey);
      if (card) tempDeckCards[item.cardKey] = { card, qty: item.qty };
    });
  }
  document.getElementById('editor-search').value = '';
  document.getElementById('search-results').innerHTML = '';
  renderDeckSlots();
}

function closeEditor() {
  document.getElementById('deck-editor').classList.remove('open');
  document.getElementById('deck-view').style.display = 'block';
  editingDeck = null;
  tempDeckCards = {};
}

function searchCards() {
  const q = document.getElementById('editor-search').value.toLowerCase().trim();
  if (!q) { document.getElementById('search-results').innerHTML = ''; return; }
  const results = allCards.filter(c => (c.name||'').toLowerCase().includes(q)).slice(0, 20);
  document.getElementById('search-results').innerHTML = results.map(c => {
    const key = `${c._setCode}_${c.collector_number}`;
    const urls = buildImageUrls(c, c._setCode);
    const imgSrc = urls[0] || '';
    return `
      <div class="search-item">
        <img src="${imgSrc}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="sub">${c.version ? c.version + ' · ' : ''}S${c._setCode} #${c.collector_number}</div>
        </div>
        <button class="add-btn" onclick="addToDeck('${key}')">＋</button>
      </div>`;
  }).join('');
}

function addToDeck(key) {
  const card = allCards.find(c => `${c._setCode}_${c.collector_number}` === key);
  if (!card) return;
  const total = Object.values(tempDeckCards).reduce((s,v) => s+v.qty, 0);
  if (total >= 60) { alert('デッキは60枚までです'); return; }

  // デュアルインク制限: インクは2色まで
  const deckInks = new Set();
  Object.values(tempDeckCards).forEach(v => {
    (v.card.inks||[v.card.ink]).filter(Boolean).forEach(i => deckInks.add(i));
  });
  const cardInks = (card.inks||[card.ink]).filter(Boolean);
  cardInks.forEach(i => deckInks.add(i));
  if (deckInks.size > 2) { alert('デッキのインクは2色までです'); return; }

  if (tempDeckCards[key]) {
    if (tempDeckCards[key].qty >= 4) { alert('同名カードは4枚までです'); return; }
    tempDeckCards[key].qty++;
  } else {
    tempDeckCards[key] = { card, qty: 1 };
  }
  renderDeckSlots();
}

function removeFromDeck(key) {
  if (!tempDeckCards[key]) return;
  tempDeckCards[key].qty--;
  if (tempDeckCards[key].qty <= 0) delete tempDeckCards[key];
  renderDeckSlots();
}

function renderDeckSlots() {
  const total = Object.values(tempDeckCards).reduce((s,v) => s+v.qty, 0);
  document.getElementById('deck-total').textContent = total;
  const slots = document.getElementById('deck-slots');
  const entries = Object.entries(tempDeckCards);
  if (entries.length === 0) {
    slots.innerHTML = '<div style="color:#666;font-size:0.78rem;padding:8px 0">カードを追加してください</div>';
    return;
  }
  slots.innerHTML = entries.map(([key, {card, qty}]) => `
    <div class="deck-slot">
      <div class="info">
        <div>${card.name}</div>
        <div class="sub">${card.version ? card.version + ' · ' : ''}S${card._setCode}</div>
      </div>
      <span class="qty">×${qty}</span>
      <button class="remove" onclick="removeFromDeck('${key}')">×</button>
    </div>`).join('');
}

async function saveDeck() {
  const name = document.getElementById('deck-name-input').value.trim();
  if (!name) { alert('デッキ名を入力してください'); return; }
  const total = Object.values(tempDeckCards).reduce((s,v) => s+v.qty, 0);
  if (total === 0) { alert('カードを追加してください'); return; }

  editingDeck.name = name;
  editingDeck.cards = Object.entries(tempDeckCards).map(([cardKey, {qty}]) => ({cardKey, qty}));

  await dbPut('decks', editingDeck.id, editingDeck);
  decks = await dbGetAll('decks');
  closeEditor();
  renderDeckList();
}

async function deleteDeck(id) {
  if (!confirm('このデッキを削除しますか？')) return;
  await dbDelete('decks', id);
  decks = await dbGetAll('decks');
  renderDeckList();
}

    document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['cards','collection','decks'][i] === tab);
  });
  if (tab === 'collection') renderCollection();
  if (tab === 'decks') {
    loadDecks();
    // エディタが開いていたら閉じる
    document.getElementById('deck-editor').classList.remove('open');
    document.getElementById('deck-view').style.display = 'block';
  }
}

// ========== 初期化 ==========
loadData();
</script>
</body>
</html>
