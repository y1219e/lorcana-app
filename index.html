<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像表示テスト</title>
<style>
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: sans-serif;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
  }
  h1 { font-size: 1.2rem; margin-bottom: 4px; }
  p { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }
  .test-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .card-test {
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
    text-align: center;
    padding-bottom: 8px;
  }
  .card-test img {
    width: 100%;
    height: auto;
    display: block;
    min-height: 80px;
    background: #0f3460;
  }
  .card-test .label { font-size: 0.7rem; color: #aaa; margin-top: 6px; padding: 0 6px; }
  .result-box {
    margin-top: 24px;
    background: #16213e;
    border-radius: 8px;
    padding: 16px;
    font-size: 0.85rem;
  }
  .result-box h2 { font-size: 1rem; margin: 0 0 12px; }
  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #0f3460;
  }
  .badge { padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
  .ok   { background: #27ae60; color: #fff; }
  .fail { background: #e74c3c; color: #fff; }
  .wait { background: #555; color: #ccc; }
</style>
</head>
<body>

<h1>🔍 GitHub Pages 画像表示テスト</h1>
<p>disneylorcana.jp と Lorcast CDN の画像がhttps経由で表示されるか確認します。</p>

<div class="test-grid">
  <div class="card-test">
    <img id="img1"
      src="https://disneylorcana.jp/wp-content/uploads/2025/01/001_DLCS1_UAC_Ariel_OnHumanLegs_JA-429x600.webp"
      alt="アリエル">
    <div class="label">disneylorcana.jp<br>アリエル</div>
  </div>
  <div class="card-test">
    <img id="img2"
      src="https://cards.lorcast.io/card/digital/normal/crd_d9f3b86af85f48579ed9d0d7ce0de129.avif?1709690747"
      alt="Ariel (Lorcast)">
    <div class="label">Lorcast CDN<br>Ariel</div>
  </div>
  <div class="card-test">
    <img id="img3"
      src="https://cards.lorcast.io/card/digital/normal/crd_cbc18e77d7ec4d50bf19650a9a559686.avif?1709690747"
      alt="Elsa (Lorcast)">
    <div class="label">Lorcast CDN<br>Elsa</div>
  </div>
</div>

<div class="result-box">
  <h2>📊 判定結果</h2>
  <div class="result-item">
    <span>disneylorcana.jp（日本語版）</span>
    <span class="badge wait" id="r1">確認中…</span>
  </div>
  <div class="result-item">
    <span>Lorcast CDN（Ariel）</span>
    <span class="badge wait" id="r2">確認中…</span>
  </div>
  <div class="result-item">
    <span>Lorcast CDN（Elsa）</span>
    <span class="badge wait" id="r3">確認中…</span>
  </div>
  <div class="result-item" style="border:none; margin-top:8px;">
    <span><strong>総合判定</strong></span>
    <span class="badge wait" id="total">待機中</span>
  </div>
</div>

<script>
const tests = [
  { img: document.getElementById('img1'), badge: document.getElementById('r1') },
  { img: document.getElementById('img2'), badge: document.getElementById('r2') },
  { img: document.getElementById('img3'), badge: document.getElementById('r3') },
];
let done = 0, ok = 0;
tests.forEach(({ img, badge }) => {
  img.onload = () => {
    if (img.naturalWidth > 10) { badge.textContent='✅ OK'; badge.className='badge ok'; ok++; }
    else { badge.textContent='🚫 NG'; badge.className='badge fail'; }
    if (++done === tests.length) finish();
  };
  img.onerror = () => {
    badge.textContent = '🚫 NG'; badge.className = 'badge fail';
    if (++done === tests.length) finish();
  };
});
function finish() {
  const t = document.getElementById('total');
  if (ok === tests.length) { t.textContent='✅ 全て表示OK！アプリ開発に進めます'; t.className='badge ok'; }
  else if (ok === 0)        { t.textContent='🚫 全てNG'; t.className='badge fail'; }
  else                      { t.textContent='⚠️ 一部OK ('+ok+'/'+tests.length+')'; t.className='badge fail'; }
}
</script>
</body>
</html>
