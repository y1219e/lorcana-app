<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ロルカナ コレクション v2-refactored</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e; --border: #2a2a4a;
  --text: #eee; --text2: #aaa; --accent: #7c6dfa;
  --amber: #f5a623; --amethyst: #9b59b6; --emerald: #27ae60;
  --ruby: #e74c3c; --sapphire: #2980b9; --steel: #95a5a6;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
#nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--surface); border-top: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 10px 4px 14px; background: none; border: none; color: var(--text2); font-size: 0.65rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav-btn .icon { font-size: 1.3rem; }
.nav-btn.active { color: var(--accent); }
.page { display: none; padding-bottom: 70px; }
.page.active { display: block; }
.page-header { background: var(--surface); padding: 8px 16px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; justify-content: space-between; }
.page-header-logo { height: 44px; width: auto; flex-shrink: 0; }
.page-header h1 { flex: 1; text-align: center; font-size: 1rem; }
.page-header h1 { font-size: 1rem; flex: 1; }
.badge { background: var(--accent); color: #fff; font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; }
.filter-bar { padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-bar::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 0.72rem; cursor: pointer; white-space: nowrap; }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip.amber { border-color: var(--amber); } .chip.amber.active { background: var(--amber); border-color: var(--amber); color: #000; }
.chip.amethyst { border-color: var(--amethyst); } .chip.amethyst.active { background: var(--amethyst); border-color: var(--amethyst); }
.chip.emerald { border-color: var(--emerald); } .chip.emerald.active { background: var(--emerald); border-color: var(--emerald); }
.chip.ruby { border-color: var(--ruby); } .chip.ruby.active { background: var(--ruby); border-color: var(--ruby); }
.chip.sapphire { border-color: var(--sapphire); } .chip.sapphire.active { background: var(--sapphire); border-color: var(--sapphire); }
.chip.steel { border-color: var(--steel); } .chip.steel.active { background: var(--steel); border-color: var(--steel); }
.search-bar { padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
.view-tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.view-tab { flex: 1; padding: 8px 4px; background: none; border: none; color: var(--text2); font-size: 0.72rem; cursor: pointer; border-bottom: 2px solid transparent; }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }
#advCostMin, #advCostMax, #advStrMin, #advStrMax, #advWpMin, #advWpMax, #advLoreMin, #advLoreMax, #advMcMin, #advMcMax { height:4px; margin:0; outline:none; }
#advCostMin::-webkit-slider-thumb, #advCostMax::-webkit-slider-thumb, #advStrMin::-webkit-slider-thumb, #advStrMax::-webkit-slider-thumb, #advWpMin::-webkit-slider-thumb, #advWpMax::-webkit-slider-thumb, #advLoreMin::-webkit-slider-thumb, #advLoreMax::-webkit-slider-thumb, #advMcMin::-webkit-slider-thumb, #advMcMax::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; pointer-events:auto; border:2px solid #fff; }
.search-bar input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 0.85rem; }
.search-bar input::placeholder { color: var(--text2); }
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
.card-item { background: var(--surface); border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; border: 2px solid transparent; }
.card-item.owned { border-color: var(--accent); }
.card-item img { width: 100%; aspect-ratio: 429/600; object-fit: cover; display: block; background: var(--surface2); }
.card-item .card-info { padding: 4px 5px; }
.card-item .card-name { font-size: 0.62rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 2px; }
.card-item .card-sub { font-size: 0.55rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 1px; }
.card-item .own-badge { position: absolute; top: 4px; right: 4px; background: #000; color: #fff; font-size: 0.65rem; font-weight: bold; padding: 1px 5px; border-radius: 8px; border: 1px solid #555; }
.own-badge.foil { border: 2px solid #c9a84c; box-shadow: 0 0 4px rgba(201,168,76,0.6); }
.img-placeholder { width: 100%; aspect-ratio: 429/600; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 0.55rem; color: #555; text-align: center; padding: 6px; }
.ink-dot { display: inline-flex; align-items: center; width: 16px; height: 16px; margin-right: 0; vertical-align: middle; flex-shrink: 0; }
.ink-dot img { width: 100%; height: 100%; object-fit: contain; display: block; }
.rarity-icon { display: inline-block; width: 10px; height: 10px; margin-right: 1px; vertical-align: middle; flex-shrink: 0; }
.rarity-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: transparent; width: 100%; max-width: 420px; padding: 0; display: flex; flex-direction: column; align-items: center; }
.modal-img-row { display: flex; align-items: center; justify-content: center; }
.modal-img-row img { width: 100%; max-width: 320px; border-radius: 12px; display: block; }
.modal-card-name { font-size: 1rem; font-weight: bold; display: none; }
.modal-card-sub { font-size: 0.8rem; color: var(--text2); margin-top: 2px; display: none; }
.modal-card-meta { font-size: 0.75rem; color: var(--text2); margin-top: 6px; }
.count-row { display: flex; align-items: center; justify-content: space-between; margin-top: 0; padding: 14px 20px; }
.count-row label { font-size: 0.9rem; }
.count-btns { display: flex; align-items: center; gap: 12px; }
.count-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 1.2rem; cursor: pointer; }
.count-btn:disabled { background: var(--border); }
.count-val { font-size: 1.3rem; font-weight: bold; min-width: 24px; text-align: center; }
.modal-close { width: 100%; margin-top: 16px; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; cursor: pointer; }
.progress-section { padding: 12px; }
.progress-card { background: var(--surface); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.progress-card h3 { font-size: 0.85rem; margin-bottom: 6px; }
.progress-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; }
.progress-bar { background: var(--accent); height: 6px; border-radius: 4px; }
.progress-nums { font-size: 0.7rem; color: var(--text2); margin-top: 4px; text-align: right; }
.deck-list { padding: 10px; }
.deck-card { background: var(--surface); border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; }

#sleevePicker { display: none; }
#sleevePicker.open { display: block !important; }
.sleeve-option { width: 56px; height: 77px; border-radius: 5px; object-fit: cover; object-position: center top; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.sleeve-option.selected { border-color: var(–accent); }
.sleeve-option-none { width: 56px; height: 77px; border-radius: 5px; background: var(–surface); border: 2px solid var(–border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.sleeve-option-none.selected { border-color: var(–accent); }
.deck-sleeve { width: 48px; height: 66px; border-radius: 5px; object-fit: cover; object-position: center top; flex-shrink: 0; background: var(–surface2); }
.deck-sleeve-placeholder { width: 48px; height: 66px; border-radius: 5px; background: var(–surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.deck-card h3 { font-size: 0.9rem; }
.deck-card .deck-meta { font-size: 0.72rem; color: var(–text2); margin-top: 3px; }
.deck-card .deck-count { font-size: 1.1rem; font-weight: bold; color: var(–accent); }
.add-deck-btn { display: block; width: calc(100% - 20px); margin: 0 10px; padding: 13px; background: var(–accent); border: none; border-radius: 10px; color: #fff; font-size: 0.95rem; cursor: pointer; }
#deckEditor { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; z-index: 9999; background: var(–bg); overflow: hidden; }
#deckEditor.open { display: flex; flex-direction: column; }
body.deck-editing .page, body.deck-editing nav { display: none !important; }
.editor-header { background: var(–surface); padding: 8px 10px; border-bottom: 1px solid var(–border); display: flex; flex-direction: column; gap: 0; }
.editor-header input { flex: 1; background: var(–surface2); border: 1px solid var(–border); border-radius: 6px; padding: 5px 10px; color: var(–text); font-size: 0.85rem; }
.btn-sm { padding: 5px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; background: var(–surface2); color: var(–text); white-space: nowrap; }
.btn-save { background: var(–accent); color: #fff; }
.btn-del { background: var(–ruby); color: #fff; }
.btn-back { background: var(–surface2); color: var(–text); border: 1px solid var(–border); }
.editor-body { display: flex; flex: 1; overflow: hidden; }
.editor-left { width: 55%; border-right: 1px solid var(–border); overflow-y: auto; }
.editor-right { width: 45%; overflow-y: auto; }
.editor-section-title { padding: 8px 10px; font-size: 0.72rem; color: var(–text2); background: var(–surface); border-bottom: 1px solid var(–border); }
.deck-card-row { display: flex; align-items: center; padding: 6px 8px; border-bottom: 1px solid var(–border); gap: 6px; }
.deck-card-row img { width: 36px; border-radius: 4px; flex-shrink: 0; }
.deck-card-row .dc-info { flex: 1; min-width: 0; }
.deck-card-row .dc-name { font-size: 0.68rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-card-row .dc-sub { font-size: 0.58rem; color: var(–text2); white-space: normal; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.deck-card-row .dc-btns { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.dc-btn { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; background: var(–surface2); color: var(–text); }
.dc-btn.rem { background: var(–ruby); color: #fff; }
.dc-btn.add { background: var(–accent); color: #fff; }
.dc-btn.add { background: var(–accent); color: #fff; }
.dc-btn.rem { background: var(–ruby); color: #fff; }
.dc-count { font-size: 0.8rem; font-weight: bold; min-width: 14px; text-align: center; }
.editor-search { padding: 6px 8px; background: var(–surface); border-bottom: 1px solid var(–border); }
.editor-search input { width: 100%; background: var(–surface2); border: 1px solid var(–border); border-radius: 6px; padding: 5px 8px; color: var(–text); font-size: 0.78rem; }
.deck-total { padding: 8px 10px; font-size: 0.78rem; color: var(–text2); }
.deck-total span { color: var(–accent); font-weight: bold; }
.ink-warning { color: var(–ruby); font-size: 0.72rem; padding: 4px 10px; }
#loadingOverlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(15,15,26,0.92); flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
#loadingOverlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid var(–border); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadProgress { font-size: 0.85rem; color: var(–text2); }
#cacheInfo { font-size: 0.72rem; color: #555; margin-top: 4px; }
#prefetchBar { display:none; position:fixed; bottom:58px; left:0; right:0; z-index:99; background:var(–surface); border-top:1px solid var(–border); padding:4px 12px; font-size:0.68rem; color:var(–text2); }
#prefetchBarInner { height:3px; background:var(–accent,#7c6dfa); border-radius:2px; margin-top:3px; transition:width 0.3s; width:0%; }
</style>

</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><div id="loadProgress">読み込み中…</div><div id="cacheInfo"></div></div>
<div id="prefetchBar"><span id="prefetchLabel"></span><div id="prefetchBarInner"></div></div>
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <!-- スライドナビ -->
    <div style="display:flex;align-items:center;justify-content:center;width:100%;gap:8px;margin-bottom:12px;">
      <button id="modalPrev" style="flex-shrink:0;background:rgba(255,255,255,0.18);border:none;color:#fff;font-size:2rem;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;">‹</button>
      <div class="modal-img-row" style="flex:1;"><img id="modalImg" src="" alt=""></div>
      <button id="modalNext" style="flex-shrink:0;background:rgba(255,255,255,0.18);border:none;color:#fff;font-size:2rem;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;">›</button>
    </div>
    <!-- 所持数 -->
    <div style="width:100%;background:var(--surface);border-radius:12px;overflow:hidden;margin-bottom:8px;">
      <div class="count-row"><label>ノーマル</label><div class="count-btns">
        <button class="count-btn" id="countDecN" style="background:#e74c3c;color:#fff;">－</button>
        <span class="count-val" id="countValN">0</span>
        <button class="count-btn" id="countIncN" style="background:#7c6dfa;color:#fff;">＋</button>
      </div></div>
      <div class="count-row" style="border-top:1px solid var(--border);"><label>フォイル ✨</label><div class="count-btns">
        <button class="count-btn" id="countDecF" style="background:#e74c3c;color:#fff;">－</button>
        <span class="count-val" id="countValF">0</span>
        <button class="count-btn" id="countIncF" style="background:#7c6dfa;color:#fff;">＋</button>
      </div></div>
    </div>
    <div style="display:flex;gap:8px;width:100%;">
      <button class="modal-close" id="modalClose" style="flex:1;padding:12px;background:var(--surface);border:none;color:var(--text2);border-radius:12px;font-size:0.9rem;cursor:pointer;">閉じる</button>
      <button id="modalWishBtn" style="padding:12px 16px;background:var(--surface);border:none;border-radius:12px;font-size:1.2rem;cursor:pointer;" title="ウィッシュリスト">🤍</button>
    </div>
  </div>
</div>
<div id="deckEditor">
  <div class="editor-header">
    <div style="display:flex;align-items:center;gap:6px;width:100%;">
      <button class="btn-sm btn-back" id="editorBack" style="background:#16213e;color:#eee;border:1px solid #2a2a4a;white-space:nowrap;flex-shrink:0;">← 戻る</button>
      <input type="text" id="deckNameInput" placeholder="デッキ名" style="flex:1;min-width:0;">
    </div>
    <div style="display:flex;align-items:center;gap:6px;width:100%;margin-top:6px;">
      <button class="btn-sm" id="sleevePickerBtn" style="padding:4px 8px;font-size:0.75rem;background:#16213e;color:#eee;flex:1;" onclick="document.getElementById('sleevePicker').classList.toggle('open')">🖼️ 画像</button>
      <button class="btn-sm btn-save" id="editorSave" style="background:#7c6dfa;color:#fff;flex:1;">保存</button>
      <button class="btn-sm btn-del" id="editorDel" style="display:none;background:#e74c3c;color:#fff;flex:1;">削除</button>
    </div>
  </div>
  <div id="sleevePicker" style="padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);">
    <div style="font-size:0.7rem;color:var(--text2);margin-bottom:6px;">スリーブ画像を選択</div>
    <div id="sleeveGrid" style="display:flex;flex-wrap:wrap;gap:6px;max-height:160px;overflow-y:auto;"></div>
  </div>
  <div class="deck-total" id="deckTotal">0 / 60枚</div>
  <div id="inkWarning" class="ink-warning" style="display:none">⚠️ インク色は2色まで</div>
  <div class="editor-body">
    <div class="editor-left"><div class="editor-section-title">デッキ内</div><div id="deckCardList"></div></div>
    <div class="editor-right">
      <div class="editor-search"><input type="text" id="editorSearch" placeholder="カード名で検索…"></div>
      <div class="editor-section-title">カードを追加</div>
      <div id="editorCardList"></div>
    </div>
  </div>
</div>
<div class="page active" id="pageCards">
  <div class="page-header"><img class="page-header-logo" src="https://pub-1ffff5ba3a074d538aa9f3027d3c97dc.r2.dev/logos/logo_app.webp" alt="ロゴ"><span class="badge" id="cardCountBadge">0</span></div>  <div class="search-bar"><input type="text" id="cardSearch" placeholder="カード名で検索…"></div>
  <div class="view-tab-bar">
    <button class="view-tab active" data-view="all">全てのカード</button>
    <button class="view-tab" data-view="collection">マイコレクション</button>
    <button class="view-tab" data-view="wishlist">ウィッシュリスト</button>
  </div>
  <div class="filter-bar" id="setFilter"></div>
  <div class="filter-bar" id="inkFilter">
    <button class="chip active" data-ink="">全て</button>
    <button class="chip" data-ink="アンバー"></button>
    <button class="chip" data-ink="アメジスト"></button>
    <button class="chip" data-ink="エメラルド"></button>
    <button class="chip" data-ink="ルビー"></button>
    <button class="chip" data-ink="サファイア"></button>
    <button class="chip" data-ink="スティール"></button>
  </div>
  <div class="card-grid" id="cardGrid"></div>
</div>
<!-- 詳細検索FAB -->
<button id="advSearchBtn" style="position:fixed;bottom:80px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;">🔍</button>
<div class="page" id="pageCollection">
  <div class="page-header"><img class="page-header-logo" src="https://pub-1ffff5ba3a074d538aa9f3027d3c97dc.r2.dev/logos/logo_app.webp" alt="ロゴ"></div>  <div class="progress-section" id="progressSection"></div>
  <div style="padding:8px 16px 16px;"><button id="cacheRefreshBtn" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:0.8rem;cursor:pointer;">🔄 カードデータを再取得（キャッシュクリア）</button></div>
</div>
<div class="page" id="pageDecks">
  <div class="page-header"><img class="page-header-logo" src="https://pub-1ffff5ba3a074d538aa9f3027d3c97dc.r2.dev/logos/logo_app.webp" alt="ロゴ"></div>  <div style="padding:10px;display:flex;gap:8px;">
    <button id="addDeckBtn" style="flex:1;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:0.9rem;cursor:pointer;">＋ 新しいデッキを作る</button>
    <button id="importDeckBtn" style="flex:1;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:0.9rem;cursor:pointer;">🔗 URLから読み込む</button>
  </div>
  <div class="deck-list" id="deckList"></div>
</div>

<!-- URLインポートモーダル -->

<div class="modal-overlay" id="importModal" style="align-items:center;justify-content:center;z-index:300;">
  <div style="background:var(--surface);border-radius:14px;padding:20px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="font-size:1rem;">デッキURLを貼り付け</h2>
      <button id="importClose" style="background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <p style="font-size:0.72rem;color:var(--text2);margin-bottom:10px;">
      タカラトミー デッキビルダーの「共有URL」をそのまま貼り付けてください。
    </p>
    <textarea id="importUrlInput" style="width:100%;height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text1);padding:8px;font-size:0.8rem;resize:none;box-sizing:border-box;" placeholder="https://www.takaratomy.co.jp/products/disneylorcana/deckbuilder/deck/?cs=...&ds=..."></textarea>
    <div id="importError" style="color:#f55;font-size:0.72rem;margin-top:6px;display:none;"></div>
    <button id="importExecBtn" style="margin-top:10px;width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;">読み込む</button>

// ═══════════════════════════════════════════
// Service Worker をBlobで登録（画像キャッシュ）
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// 画像プリフェッチ＆キャッシュ（Cache API）
// ═══════════════════════════════════════════
const IMG_CACHE_NAME = 'lorcana-img-v6';
const PREFETCH_CONCURRENCY = 8;

async function prefetchAllImages(cards, onProgress) {
  if (!('caches' in window)) return; // 非対応ブラウザはスキップ
  const cache = await caches.open(IMG_CACHE_NAME);
  const IMG_HOST_PF = 'https://pub-1ffff5ba3a074d538aa9f3027d3c97dc.r2.dev/';

  // 全カードのURLリスト
  const items = cards
    .filter(c => c.card_file)
    .map(c => IMG_HOST_PF + c.card_file + '.png');

  // キャッシュ済みをスキップ
  const todo = [];
  let done = 0;
  for (const url of items) {
    const hit = await cache.match(url);
    if (hit) done++;
    else todo.push(url);
  }
  onProgress(done, items.length);
  if (todo.length === 0) return;

  // 並列ワーカー
  let idx = 0;
  async function worker() {
    while (idx < todo.length) {
      const url = todo[idx++];
      try {
        const res = await fetch(url, { mode: 'cors' });
        if (res.ok) await cache.put(url, res);
      } catch(e) {}
      done++;
      onProgress(done, items.length);
    }
  }
  await Promise.all(Array.from({ length: PREFETCH_CONCURRENCY }, worker));
}

function makeRarityIcon(rarity) {
  const span = document.createElement('span');
  span.className = 'rarity-icon';
  const src = RARITY_IMG[rarity] ?? '';
  if(src) {
    const img = document.createElement('img');
    img.src = src;
    img.alt = rarity ?? '';
    span.appendChild(img);
  }
  return span;
}

// カードデータキャッシュ（IndexedDB, 2ヶ月TTL）
// ═══════════════════════════════════════════
const CARD_CACHE_TTL = 60 * 24 * 60 * 60 * 1000; // 2ヶ月 (ms)
const CARD_CACHE_KEY = 'card_cache_v6';

async function loadCardCache() {
  return new Promise(r => {
    const tx = db.transaction('meta', 'readonly');
    tx.objectStore('meta').get(CARD_CACHE_KEY).onsuccess = e => r(e.target.result ?? null);
  });
}
async function saveCardCache(sets, cards) {
  return new Promise(r => {
    const tx = db.transaction('meta', 'readwrite');
    tx.objectStore('meta').put({ id: CARD_CACHE_KEY, sets, cards, savedAt: Date.now() });
    tx.oncomplete = () => r();
  });
}

function buildImageUrls(card){
  if(card.card_file) {
    return [IMG_HOST + card.card_file + '.png'];
  }
  return [''];
}
// メモリキャッシュ（ObjectURL）
const _imgUrlCache = new Map();

async function resolveImgSrc(url) {
  if (_imgUrlCache.has(url)) return _imgUrlCache.get(url);
  if ('caches' in window) {
    const cache = await caches.open(IMG_CACHE_NAME);
    const hit = await cache.match(url);
    if (hit) {
      const blob = await hit.blob();
      const objUrl = URL.createObjectURL(blob);
      _imgUrlCache.set(url, objUrl);
      return objUrl;
    }
  }
  // キャッシュなし → 通常URLで表示（ブラウザが取得）
  return url;
}

function makeImg(card, deckStyle){
  const img = document.createElement('img');

let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open('lorcana', 4);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('collection')) d.createObjectStore('collection',{keyPath:'id'});
      if(!d.objectStoreNames.contains('decks'))      d.createObjectStore('decks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta'))       d.createObjectStore('meta',{keyPath:'id'});
      if(!d.objectStoreNames.contains('wishlist'))   d.createObjectStore('wishlist',{keyPath:'id'});

    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = () => rej(req.error);
  });
}
function dbPut(store,val){ return new Promise(r=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(val).onsuccess=()=>r(); }); }
function dbDelete(store,key){ return new Promise(r=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(key).onsuccess=()=>r(); }); }
function dbGetAll(store){ return new Promise(r=>{ const tx=db.transaction(store,'readonly'); tx.objectStore(store).getAll().onsuccess=e=>r(e.target.result); }); }

let allCards=[],sets=[],collection={},wishlist=new Set(),cardView='all',advFilter={rarities:new Set(),types:new Set(),classifications:new Set(),keywords:new Set(),inks:new Set(),sets:new Set(),costMin:null,costMax:null,strMin:null,strMax:null,wpMin:null,wpMax:null,loreMin:null,loreMax:null,mcMin:null,mcMax:null,inkwell:null,inkType:null,collectionStatus:null,textQ:'',sortOrder:'id_asc'},decks=[],filterSets=new Set(),filterInks=new Set(),searchQ='',currentCard=null,currentDeck=null;

function filteredCards(){
  return allCards.filter(c=>{
    if(cardView==='collection' && ownedTotal(c.id)===0) return false;
    if(cardView==='wishlist' && !wishlist.has(c.id)) return false;
    if(advFilter.collectionStatus==='owned' && ownedTotal(c.id)===0) return false;
    if(advFilter.collectionStatus==='notowned' && ownedTotal(c.id)>0) return false;
    if(filterSets.size>0 && !filterSets.has(c.set?.code)) return false;
    if(filterInks.size>0){
      const cardInks = c.inks ?? (c.ink ? [c.ink] : []);
      if(!cardInks.some(ink => filterInks.has(ink))) return false;
    }
    if(searchQ){ const q=searchQ.toLowerCase(); if(!(c.name?.toLowerCase().includes(q)||c.version?.toLowerCase().includes(q))) return false; }
    if(advFilter.rarities.size>0 && !advFilter.rarities.has(c.rarity)) return false;
    // タイプフィルター
    // action_song = card_type が アクション かつ classifications に「歌」を含む
    if(advFilter.types.size>0){
      const isAction = (c.type??[]).includes('アクション');
      const isSong   = isAction && (c.classifications??[]).includes('歌');
      let matched = false;
      for(const t of advFilter.types){
        if(t==='action_song'  && isSong)                              { matched=true; break; }
        if(t==='アクション'   && isAction && !isSong)                 { matched=true; break; }
        if(t!=='action_song'  && t!=='アクション' && (c.type??[]).includes(t)){ matched=true; break; }
      }
      if(!matched) return false;
    }
    if(advFilter.classifications.size>0 && !(c.classifications??[]).some(t=>advFilter.classifications.has(t))) return false;
    if(advFilter.keywords.size>0 && !(c.keywords??[]).some(k=>advFilter.keywords.has(k))) return false;
    if(advFilter.inkType==='single' && (c.inks??[c.ink]).filter(Boolean).length!==1) return false;
    if(advFilter.inkType==='dual' && (c.inks??[c.ink]).filter(Boolean).length<2) return false;
    if(advFilter.inks.size>0){ const ci=c.inks??(c.ink?[c.ink]:[]); if(!ci.some(i=>advFilter.inks.has(i))) return false; }
    if(advFilter.sets.size>0 && !advFilter.sets.has(c.set?.code)) return false;
    if(advFilter.costMin!==null && (c.cost??0)<advFilter.costMin) return false;
    if(advFilter.costMax!==null && (c.cost??0)>advFilter.costMax) return false;
    if(advFilter.strMin!==null && (c.strength==null || c.strength<advFilter.strMin)) return false;
    if(advFilter.strMax!==null && (c.strength==null || c.strength>advFilter.strMax)) return false;
    if(advFilter.wpMin!==null && (c.willpower==null || c.willpower<advFilter.wpMin)) return false;
    if(advFilter.wpMax!==null && (c.willpower==null || c.willpower>advFilter.wpMax)) return false;
    if(advFilter.loreMin!==null && (c.lore==null || c.lore<advFilter.loreMin)) return false;
    if(advFilter.loreMax!==null && (c.lore==null || c.lore>advFilter.loreMax)) return false;
    if(advFilter.mcMin!==null || advFilter.mcMax!==null){
      if(c.move_cost==null) return false;
      if(advFilter.mcMin!==null && c.move_cost<advFilter.mcMin) return false;
      if(advFilter.mcMax!==null && c.move_cost>advFilter.mcMax) return false;
    }
    if(advFilter.inkwell===true && !c.inkwell) return false;
    if(advFilter.inkwell===false && c.inkwell) return false;
    if(advFilter.textQ){ const tq=advFilter.textQ.toLowerCase(); if(!(c.text??'').toLowerCase().includes(tq)) return false; }
    return true;
  });
}

function renderCardGrid(){
  const grid=document.getElementById('cardGrid');

  const INK_ORDER=['アンバー','アメジスト','エメラルド','ルビー','サファイア','スティール'];
  cards = [...cards].sort((a,b)=>{
    if(advFilter.sortOrder==='id_asc'||advFilter.sortOrder==='id_desc'){
      const sc=(a.set?.code??'').localeCompare(b.set?.code??'',undefined,{numeric:true});
      const nc=String(a.collector_number??'').localeCompare(String(b.collector_number??''),undefined,{numeric:true});
      const r=sc!==0?sc:nc;
      return advFilter.sortOrder==='id_desc'?-r:r;
    }
    if(advFilter.sortOrder==='cost_asc'||advFilter.sortOrder==='cost_desc'){
      const ca=a.cost??0, cb=b.cost??0;
      if(ca!==cb) return advFilter.sortOrder==='cost_asc'?ca-cb:cb-ca;
      // 同コストは弾番号→インク色→コレクター番号順
      const sc=(a.set?.code??'').localeCompare(b.set?.code??'',undefined,{numeric:true});
      if(sc!==0) return sc;
      const ia=INK_ORDER.indexOf(a.ink??a.inks?.[0]??''), ib=INK_ORDER.indexOf(b.ink??b.inks?.[0]??'');
      if(ia!==ib) return ia-ib;
      return String(a.collector_number??'').localeCompare(String(b.collector_number??''),undefined,{numeric:true});
    }
    return 0;
  });
  badge.textContent=cards.length;
  grid.innerHTML='';

    info.appendChild(nameDiv); info.appendChild(subDiv);
    item.appendChild(info);
    if(total>0){ const o=getOwned(card.id); const b=document.createElement('div'); b.className='own-badge'; b.textContent=o.normal+o.foil; if(o.foil>0) b.classList.add('foil'); item.appendChild(b); }

// dsコードデコード: 'AECUBI' → {setNum, collectorNum, count}
function decodeDsCode(ds) {
  function b36(c) {
    if (c >= 'A' && c <= 'Z') return c.charCodeAt(0) - 65;
    return 26 + parseInt(c);
  }
  if (!ds || ds.length !== 6) return null;
  const setNum = b36(ds[1]);
  const colNum = b36(ds[2]) * 36 + b36(ds[3]);
  const cntEnc = b36(ds[4]) * 36 + b36(ds[5]);
  const cntMap = {10:1, 20:2, 32:3, 44:4, 54:4};
  const count = cntMap[cntEnc] ?? 1;
  return { setNum, colNum, count };
}

// URLからデッキをインポート
async function importDeckFromUrl(url) {
  // URLまたはdsパラメータ文字列（コピー時に%2C区切りになる場合も対応）
  let dsCodes;
  const trimmed = url.trim();
  // dsパラメータを含むURLの場合
  const dsMatch = trimmed.match(/[?&]ds=([^&]+)/);
  if (dsMatch) {
    dsCodes = decodeURIComponent(dsMatch[1]).split(',').map(s => s.trim()).filter(Boolean);
  } else if (/^[A-Z0-9,%]+$/i.test(trimmed)) {
    // dsコードのみ（カンマ区切りまたは%2C区切り）
    dsCodes = decodeURIComponent(trimmed).split(',').map(s => s.trim()).filter(Boolean);
  } else {
    throw new Error('URLまたはdsコードの形式が正しくありません。');
  }
  if (dsCodes.length === 0) throw new Error('カード情報が空です');
  if (dsCodes.length === 0) throw new Error('カード情報が空です');
  if (allCards.length === 0) throw new Error('カードデータがまだ読み込まれていません。しばらく待ってから再度お試しください。');
  const cards = {};
  const notFound = [];
  for (const ds of dsCodes) {
    const decoded = decodeDsCode(ds);
    if (!decoded) { notFound.push(ds); continue; }
    const { setNum, colNum, count } = decoded;
    // set.codeとcollector_numberで検索（card.idのフォーマットに依存しない）
    const card = allCards.find(c => Number(c.set?.code) === Number(setNum) && Number(c.collector_number) === Number(colNum));
    if (!card) { notFound.push(setNum + '弾#' + colNum); continue; }
    const cardId = card.id;
    cards[cardId] = (cards[cardId] ?? 0) + count;
  }
  if (Object.keys(cards).length === 0) {
    throw new Error('カードが1枚も見つかりませんでした。見つからなかったコード: ' + notFound.join(', '));
  }
  const csMatch = trimmed.match(/[?&]cs=([^&]+)/);
  const deckName = csMatch ? decodeURIComponent(csMatch[1]).replace(/%2C|,/g, '/') + ' デッキ' : 'インポートデッキ';
  const newDeck = { id: Date.now().toString(), name: deckName, cards };
  await dbPut('decks', newDeck);
  decks.push(newDeck);
  renderDeckList();
  const total = Object.values(cards).reduce((a,b)=>a+b,0);
  const warn = notFound.length > 0 ? ' (スキップ: ' + notFound.join(', ') + ')' : '';
  return Object.keys(cards).length + '種 ' + total + '枚のカードを読み込みました' + warn;
}

// データ取得（並列fetch + IndexedDBキャッシュ）
// ═══════════════════════════════════════════
async function loadData(){
  const overlay = document.getElementById('loadingOverlay');
  const prog    = document.getElementById('loadProgress');
  const cInfo   = document.getElementById('cacheInfo');
  overlay.classList.add('show');

  // キャッシュチェック
  const cached = await loadCardCache();
  const now = Date.now();
  if(cached && (now - cached.savedAt) < CARD_CACHE_TTL) {
    const age = Math.floor((now - cached.savedAt) / (24*60*60*1000));
    prog.textContent = 'キャッシュから読み込み中…';
    cInfo.textContent = `最終更新: ${age}日前`;
    sets    = cached.sets;
    allCards = cached.cards;
    overlay.classList.remove('show');
    return;
  }

  // キャッシュなし or 期限切れ → APIから取得
  cInfo.textContent = cached ? '2ヶ月経過のため再取得中…' : '';
  try {
    prog.textContent = 'カードデータを取得中…';
    const res = await fetch('https://lorcana-api.com/api/cards');
    const data = await res.json();
    const rawCards = Array.isArray(data) ? data : (data.cards ?? []);

    // sets を sets_order から生成
    const setMap = {};
    rawCards.forEach(c => {
      const order = c.sets_order ?? 0;
      const code  = String(Math.round(order / 100));
      if(!setMap[code]) setMap[code] = { code, name: c.sets ?? `第${code}弾` };
    });
    sets = Object.values(setMap).sort((a,b) =>
      a.code.localeCompare(b.code, undefined, {numeric:true})
    );

    function extractKeywords(rulesText) {
      if(!rulesText) return [];
      const matches = rulesText.match(/<([^>]+)>/g) ?? [];
      return [...new Set(matches.map(m => {
        const kw = m.slice(1,-1).trim();
        // 「変身：〜」「だれでも変身」「〇〇変身」等を全て「変身」に統一
        if(kw.includes('変身')) return '変身';
        return kw;
      }))];
    }
    allCards = rawCards.map(c => {
      const order  = c.sets_order ?? 0;
      const code   = String(Math.round(order / 100));
      const inks = [c.ink_color, c.ink_color2].filter(Boolean);
      return {
        id:               `tt_${code}_${c.collector_number}`,
        name:             c.card_name   ?? '',
        version:          c.version     ?? '',
        type:             c.card_type ? [c.card_type] : [],
        rarity:           c.rarity ?? '',
        ink:              inks[0] ?? '',
        inks:             inks.length > 0 ? inks : [],
        cost:             c.ink_cost    != null ? Number(c.ink_cost)   : null,
        strength:         c.strength    != null ? Number(c.strength)   : null,
        willpower:        c.willpower   != null ? Number(c.willpower)  : null,
        lore:             c.lore_value  != null ? Number(c.lore_value) : null,
        move_cost:        (c.card_type==='ロケーション' && c.move_cost!=null) ? Number(c.move_cost) : null,
        inkwell:          c.inkwell === 'y',
        text:             [c.rules_text, c.flavor_text].filter(Boolean).join('\n'),
        classifications:  c.classifications ?? [],
        keywords:         extractKeywords(c.rules_text),
        artist:           c.artist_credit1 ?? '',
        card_file:        c.card_file   ?? '',
        collector_number: String(c.collector_number ?? ''),
        set: { code, name: c.sets ?? `第${code}弾` },
      };
    });

    allCards.sort((a,b)=>{
      const sc = (a.set?.code??'').localeCompare(b.set?.code??'',undefined,{numeric:true});
      return sc!==0 ? sc : String(a.collector_number).localeCompare(String(b.collector_number),undefined,{numeric:true});
    });

    // キャッシュ保存
    await saveCardCache(sets, allCards);

  } catch(e) {
    prog.textContent = 'エラー: ' + e.message;
    // キャッシュが古くても使う
    if(cached) { sets = cached.sets; allCards = cached.cards; }
    else { overlay.classList.remove('show'); return; }
  }

  overlay.classList.remove('show');
}

    function makeToggleBtn(label, activeSet, key, container){

  function buildAdvUI(){
    // 並び替え（ドロップダウン）

      wrap.addEventListener('click',()=>{ if(advFilter.inks.has(ink)) advFilter.inks.delete(ink); else advFilter.inks.add(ink); buildAdvUI(); });
      inkGrid.appendChild(wrap);
    });

    // レアリティ（アイコンのみ・文字なし・エピックをレジェの後に）
    const rGrid=document.getElementById('advRarityGrid');
    rGrid.innerHTML='';
    ['コモン','アンコモン','レア','スーパーレア','レジェンダリー','エピック','エンチャンテッド','アイコニック'].forEach(r=>{
      const wrap=document.createElement('div');

    // セット

    // タイプ
    const tGrid=document.getElementById('advTypeGrid');
    tGrid.innerHTML='';
    {
      const TYPE_BTNS=[
        {key:'キャラクター', label:'キャラクター'},
        {key:'アクション',   label:'アクション・歌以外'},
        {key:'action_song',  label:'アクション・歌'},
        {key:'アイテム',     label:'アイテム'},
        {key:'ロケーション', label:'ロケーション'},
      ];
      TYPE_BTNS.forEach(({key,label})=>{
        const btn=document.createElement('button');
        btn.textContent=label;
        btn.dataset.key=key;
        const active=advFilter.types.has(key);

        btn.addEventListener('click',()=>{ if(advFilter.types.has(key)) advFilter.types.delete(key); else advFilter.types.add(key); buildAdvUI(); });
        tGrid.appendChild(btn);
      });
    }

    // 能力（keywords）- rules_textの<XXX>から抽出した日本語キーで管理
    const KEYWORD_ORDER = ['護衛','果敢','回避','暴勇','耐久','突進','変身','歌声','支援','霧消','魔除','抵抗','強行','突撃','加速'];
    const kwGrid=document.getElementById('advKeywordGrid');

      allCards.forEach(c=>(c.keywords??[]).forEach(k=>existingKw.add(k)));
      // 指定順で存在するものを先に、残りは追加
      const orderedKw = KEYWORD_ORDER.filter(k=>existingKw.has(k));
      const restKw    = [...existingKw].filter(k=>!KEYWORD_ORDER.includes(k)).sort((a,b)=>a.localeCompare(b,'ja'));

        document.getElementById(idFill).style.width=((hi2-lo2)/max*100)+'%';
        document.getElementById(idLabel).textContent=(lo2===0&&hi2===max)?'全て':(lo2===hi2?lo2+suffix:lo2+'〜'+hi2+suffix);
        document.getElementById('advApply').textContent='結果を表示（'+filteredCards().length+'件）';
      }
      if(!sMin._init){ sMin._init=true; sMin.addEventListener('input',()=>{ if(parseInt(sMin.value)>parseInt(sMax.value)) sMax.value=sMin.value; upd(); }); sMax.addEventListener('input',()=>{ if(parseInt(sMax.value)<parseInt(sMin.value)) sMin.value=sMax.value; upd(); }); }
      upd();
    }
    initRangeSlider('advStrMin','advStrMax','advStrFill','advStrLabel',12,'strMin','strMax','');

    const ti=document.getElementById('advTextInput');
    ti.value=advFilter.textQ??'';
    ti.oninput=()=>{ advFilter.textQ=ti.value; document.getElementById('advApply').textContent='結果を表示（'+filteredCards().length+'件）'; };

    // コレクション状況
    document.getElementById('advCollectionBtns').querySelectorAll('button').forEach(btn=>{
      const val=btn.dataset.val;
      const active=advFilter.collectionStatus===val;
      btn.style.borderColor=active?'var(--accent)':'var(--border)';
      btn.style.background=active?'rgba(124,109,250,0.2)':'var(--surface2)';
      btn.style.color=active?'var(--accent)':'var(--text2)';
      btn.onclick=()=>{ advFilter.collectionStatus=(advFilter.collectionStatus===val)?null:val; buildAdvUI(); };
    });

    // シングル/デュアルインク
    document.getElementById('advInkTypeBtns').querySelectorAll('button').forEach(btn=>{
      const val=btn.dataset.val;
      const active=advFilter.inkType===val;
      btn.style.borderColor=active?'var(--accent)':'var(--border)';
      btn.style.background=active?'rgba(124,109,250,0.2)':'var(--surface2)';
      btn.style.color=active?'var(--accent)':'var(--text2)';
      btn.onclick=()=>{ advFilter.inkType=(advFilter.inkType===val)?null:val; buildAdvUI(); };
    });

    // クラス（APIが日本語で返すのでキーも日本語）
    const CLASS_ORDER_JA = [
      'ストーリーボーン','ドリームボーン','フラッドボーン',
      '仲間','ほうき','キャプテン','神格','探偵','恐竜','ドラゴン',
      '妖精','導き手','ヒーロー','ハイエナ','イリュージョン','発明家','王様','騎士',
      'マドリガル家','モンスター','銃士','海賊','プリンス','プリンセス',
      '子犬','女王','レーサー','ロボット','7人のこびと','歌','魔法使い',
      'スーパー','ティガー','タイタン','トイ','ヴィランズ',
    ];
    const classGrid=document.getElementById('advClassGrid');
    if(classGrid){
      classGrid.innerHTML='';
      const existingClass=new Set();
      allCards.forEach(c=>(c.classifications??[]).forEach(cl=>existingClass.add(cl)));
      const ordered = CLASS_ORDER_JA.filter(cl=>existingClass.has(cl));
      const rest    = [...existingClass].filter(cl=>!CLASS_ORDER_JA.includes(cl)).sort((a,b)=>a.localeCompare(b,'ja'));
      [...ordered,...rest].forEach(cl=>{ makeToggleBtn(cl, advFilter.classifications, cl, classGrid); });
    }
    // 結果件数
    document.getElementById('advApply').textContent='結果を表示（'+filteredCards().length+'件）';
  }
  document.getElementById('advSearchBtn').addEventListener('click',()=>{
    buildAdvUI();
    document.getElementById('advSearchModal').classList.add('open');
  });
  document.getElementById('advClose').addEventListener('click',()=>{
    document.getElementById('advSearchModal').classList.remove('open');
    renderCardGrid();
  });
  document.getElementById('advReset2').addEventListener('click',()=>{
    advFilter={rarities:new Set(),types:new Set(),classifications:new Set(),keywords:new Set(),inks:new Set(),sets:new Set(),costMin:null,costMax:null,strMin:null,strMax:null,wpMin:null,wpMax:null,loreMin:null,loreMax:null,mcMin:null,mcMax:null,inkwell:null,inkType:null,collectionStatus:null,textQ:'',sortOrder:'id_asc'};
    buildAdvUI();
  });
  document.getElementById('advApply').addEventListener('click',()=>{
    document.getElementById('advSearchModal').classList.remove('open');
    renderCardGrid();
  });

  // ======= /詳細検索 =======

  // ビュータブ切り替え
  document.querySelectorAll('.view-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      cardView=btn.dataset.view;
      renderCardGrid();
    });
  });

  // ウィッシュリストトグル
  document.getElementById('modalWishBtn').addEventListener('click', async()=>{
    if(!currentCard) return;
    const id=currentCard.id;
    if(wishlist.has(id)){
      wishlist.delete(id);
      try { await dbDelete('wishlist',id); } catch(e) {}
      document.getElementById('modalWishBtn').textContent='🤍';
    } else {
      wishlist.add(id);
      try { await dbPut('wishlist',{id}); } catch(e) {}
      document.getElementById('modalWishBtn').textContent='❤️';
    }
    renderCardGrid();
  });
})();
</script>

</body>
</html>
